<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AClaw - Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 15px 20px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    .status {
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 20px;
      background: #0f3460;
    }
    .status.connected { background: #28a745; }
    .status.disconnected { background: #dc3545; }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
    }
    .message.user { align-self: flex-end; background: #0f3460; }
    .message.agent { align-self: flex-start; background: #16213e; }
    .message .sender { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
    .input-container {
      background: #16213e;
      padding: 15px 20px;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: #e94560; }
    button {
      padding: 12px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    button:hover { background: #c73e54; }
    button:disabled { background: #555; cursor: not-allowed; }
    .typing { color: #888; font-style: italic; padding: 0 20px; font-size: 0.9rem; }
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
    }
    .login-box {
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }
    .login-box h2 { text-align: center; margin-bottom: 30px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    .login-error { color: #e94560; text-align: center; margin-top: 15px; display: none; }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-container">
    <div class="login-box">
      <h2>🐲 AClaw Login</h2>
      <input type="text" id="login-username" placeholder="Username">
      <input type="password" id="login-password" placeholder="Password">
      <button onclick="doLogin()">Login</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" style="display: none; height: 100vh; flex-direction: column;">
    <div class="header">
      <h1>🐲 AClaw Chat</h1>
      <span id="status" class="status disconnected">Disconnected</span>
    </div>
    <div id="chat" class="chat-container"></div>
    <div id="typing" class="typing" style="display: none;">Agent is typing...</div>
    <div class="input-container">
      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // State
    let ws = null;
    let sessionKey = '';
    let lastRunId = null;
    let requestId = 0;
    let isConnected = false;
    let isLoggedIn = false;

    // DOM Elements
    const loginScreen = document.getElementById('login-screen');
    const chatScreen = document.getElementById('chat-screen');
    const chat = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const typingEl = document.getElementById('typing');

    // ============ Login ============
    async function doLogin() {
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      if (!username || !password) {
        errorEl.textContent = 'Please enter username and password';
        errorEl.style.display = 'block';
        return;
      }

      const wsUrl = `${CONFIG.wsUrl}?user=${encodeURIComponent(username)}&pass=${encodeURIComponent(password)}`;
      ws = new WebSocket(wsUrl);

      ws.onmessage = (event) => handleData(event.data, handleLoginResponse);

      ws.onerror = () => {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      };

      setTimeout(() => {
        if (!isLoggedIn) {
          errorEl.textContent = 'Login timeout';
          errorEl.style.display = 'block';
          if (ws) ws.close();
        }
      }, 10000);
    }

    function handleLoginResponse(msg) {
      if (msg.type === 'res' && msg.ok) {
        isLoggedIn = true;
        loginScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        setupChatHandlers();
        setStatus(true);
        console.log('Logged in, ready for chat');
      } else if (msg.type === 'res') {
        const errorEl = document.getElementById('login-error');
        errorEl.textContent = msg.error?.message || 'Login failed';
        errorEl.style.display = 'block';
        if (ws) ws.close();
        ws = null;
      }
    }

    // ============ Chat Handlers ============
    function setupChatHandlers() {
      ws.onmessage = (event) => handleData(event.data, (msg) => {
        // Update session key
        if (msg.payload?.sessionKey || msg.result?.sessionKey) {
          sessionKey = msg.payload?.sessionKey || msg.result?.sessionKey;
        }
        handleMessage(msg);
      });

      ws.onclose = () => {
        setStatus(false);
        isLoggedIn = false;
        loginScreen.style.display = 'flex';
        chatScreen.style.display = 'none';
        setTimeout(() => { if (isLoggedIn) connect(); }, 3000);
      };
    }

    function handleData(data, callback) {
      if (data instanceof Blob) {
        const reader = new FileReader();
        reader.onload = () => callback(JSON.parse(reader.result));
        reader.readAsText(data);
      } else {
        callback(JSON.parse(data));
      }
    }

    // ============ WebSocket ============
    function connect() {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      ws = new WebSocket(`${CONFIG.wsUrl}?token=${CONFIG.proxyToken}`);

      ws.onopen = () => setStatus(true);
      ws.onmessage = (event) => handleData(event.data, handleMessage);
      ws.onclose = () => { setStatus(false); setTimeout(connect, 3000); };
      ws.onerror = (e) => console.error('WebSocket error:', e);
    }

    function send(frame) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(frame));
      }
    }

    function sendMessage(text) {
      send({
        type: 'req',
        method: 'chat.send',
        id: `req_${++requestId}_${Date.now()}`,
        params: {
          sessionKey,
          message: text,
          idempotencyKey: `idem_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
        },
      });
    }

    // ============ Message Handling ============
    function handleMessage(msg) {
      // Connection established
      if (msg.type === 'res' && msg.ok) {
        if (msg.payload?.sessionKey || msg.result?.sessionKey) {
          sessionKey = msg.payload?.sessionKey || msg.result?.sessionKey;
        }
        return;
      }

      // Agent/Chat events
      if (msg.event === 'agent' || msg.event === 'chat') {
        const p = msg.payload;

        // Assistant stream
        if (p.stream === 'assistant') {
          const runId = p.runId;
          const text = p.data?.text || p.data?.delta;
          if (runId !== lastRunId && text) {
            lastRunId = runId;
            showTyping(false);
            addMessage(text, 'agent');
          }
        }

        // Typing indicator
        if (p.stream === 'lifecycle') {
          showTyping(p.data?.phase === 'start');
        }
      }
    }

    // ============ UI Functions ============
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.innerHTML = `<div class="sender">${sender === 'user' ? 'You' : '🐲 Acong'}</div>${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function setStatus(connected) {
      isConnected = connected;
      statusEl.textContent = connected ? 'Connected' : 'Disconnected';
      statusEl.className = `status ${connected ? 'connected' : 'disconnected'}`;
      sendBtn.disabled = !connected;
    }

    function showTyping(show) {
      typingEl.style.display = show ? 'block' : 'none';
    }

    // Event Listeners
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (text) {
        addMessage(text, 'user');
        messageInput.value = '';
        sendMessage(text);
      }
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
