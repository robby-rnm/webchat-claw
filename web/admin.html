<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AClaw - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    .header {
      background: #16213e;
      padding: 15px 20px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
    .header .logout-btn {
      padding: 8px 16px;
      background: #0f3460;
      color: #eee;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .header .logout-btn:hover { background: #1a4a7a; }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* Login Screen */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }
    .login-box h2 { text-align: center; margin-bottom: 30px; }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 1rem;
    }
    .login-box input::placeholder { color: #888; }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #c73e54; }
    .login-error { color: #e94560; text-align: center; margin-top: 15px; display: none; }
    
    /* Admin Panel */
    .admin-panel { display: none; }
    
    .section {
      background: #16213e;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #0f3460;
    }
    
    /* Form */
    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      outline: none;
    }
    .form-row input:focus { border-color: #e94560; }
    .form-row button {
      padding: 12px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .form-row button:hover { background: #c73e54; }
    
    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #0f3460;
    }
    th {
      font-size: 0.85rem;
      color: #888;
      font-weight: 500;
    }
    td { font-size: 0.95rem; }
    .user-id { color: #888; font-size: 0.85rem; }
    .delete-btn {
      padding: 6px 12px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .delete-btn:hover { background: #c82333; }
    .delete-btn:disabled { background: #555; cursor: not-allowed; }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }
    .message.success { background: #28a745; color: white; }
    .message.error { background: #dc3545; color: white; }
    
    .user-count {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-container">
    <div class="login-box">
      <h2>🔐 AClaw Admin</h2>
      <input type="password" id="admin-key" placeholder="Admin Key">
      <button onclick="doLogin()">Login</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="admin-panel">
    <div class="header">
      <h1>🔐 AClaw Admin</h1>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
    
    <div class="container">
      <!-- Create User Section -->
      <div class="section">
        <h2>Create New User</h2>
        <div id="create-message"></div>
        <div class="form-row">
          <input type="text" id="new-username" placeholder="Username">
          <input type="password" id="new-password" placeholder="Password">
          <button onclick="createUser()">Create User</button>
        </div>
      </div>
      
      <!-- Users List Section -->
      <div class="section">
        <h2>Users</h2>
        <p class="user-count" id="user-count"></p>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Created</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-table">
          </tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display: none;">
          No users found
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://192.168.99.211:8084';
    let adminKey = '';
    
    // ============ Login ============
    function doLogin() {
      const keyInput = document.getElementById('admin-key');
      const errorEl = document.getElementById('login-error');
      const key = keyInput.value.trim();
      
      if (!key) {
        errorEl.textContent = 'Please enter admin key';
        errorEl.style.display = 'block';
        return;
      }
      
      adminKey = key;
      loadUsers();
    }
    
    function doLogout() {
      adminKey = '';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('admin-key').value = '';
    }
    
    function showLoginError(msg) {
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    
    // ============ API ============
    async function apiRequest(endpoint, method = 'GET', body = null) {
      const headers = {
        'X-Admin-Key': adminKey,
        'Content-Type': 'application/json'
      };
      
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);
      
      const response = await fetch(API_BASE + endpoint, options);
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error?.message || 'HTTP ' + response.status);
      }
      
      return data;
    }
    
    // ============ Users ============
    async function loadUsers() {
      try {
        const data = await apiRequest('/api/admin/users');
        renderUsers(data.users || data);
      } catch (err) {
        if (err.message.includes('401') || err.message.includes('Unauthorized')) {
          showLoginError('Invalid admin key');
        } else {
          showLoginError(err.message);
        }
      }
    }
    
    function renderUsers(users) {
      // Show admin panel
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      
      const tbody = document.getElementById('users-table');
      const emptyState = document.getElementById('empty-state');
      const countEl = document.getElementById('user-count');
      
      tbody.innerHTML = '';
      
      if (!users || users.length === 0) {
        emptyState.style.display = 'block';
        countEl.textContent = '0 users';
        return;
      }
      
      emptyState.style.display = 'none';
      countEl.textContent = users.length + ' user' + (users.length !== 1 ? 's' : '');
      
      users.forEach(function(user) {
        const tr = document.createElement('tr');
        tr.innerHTML = 
          '<td class="user-id">' + (user.id || user._id || 'N/A') + '</td>' +
          '<td>' + user.username + '</td>' +
          '<td>' + (user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A') + '</td>' +
          '<td><button class="delete-btn" onclick="deleteUser(\'' + (user.id || user._id) + '\')">Delete</button></td>';
        tbody.appendChild(tr);
      });
    }
    
    async function createUser() {
      const usernameInput = document.getElementById('new-username');
      const passwordInput = document.getElementById('new-password');
      const msgEl = document.getElementById('create-message');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        msgEl.innerHTML = '<div class="message error">Please enter username and password</div>';
        return;
      }
      
      try {
        await apiRequest('/api/admin/users', 'POST', { username, password });
        msgEl.innerHTML = '<div class="message success">User created successfully!</div>';
        usernameInput.value = '';
        passwordInput.value = '';
        loadUsers();
      } catch (err) {
        msgEl.innerHTML = '<div class="message error">' + err.message + '</div>';
      }
    }
    
    async function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      
      try {
        await apiRequest('/api/admin/users/' + userId, 'DELETE');
        loadUsers();
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
